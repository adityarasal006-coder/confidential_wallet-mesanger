services:
  - type: web
    name: confidential-messenger-backend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        value: https://confidential-messenger.vercel.app # Change to your actual Vercel URL
      - key: MONGODB_URI
        value: "" # Fill this in the Render dashboard if using Atlas
    rootDir: backend
