name: CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Frontend Install
        working-directory: ./frontend
        run: npm ci

      - name: Frontend Build
        working-directory: ./frontend
        run: npm run build
        env:
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: "demo_id_for_ci"

      - name: Backend Install
        working-directory: ./backend
        run: npm ci

      - name: Backend Build
        working-directory: ./backend
        run: npm run build

      - name: Contracts Install
        working-directory: ./contracts
        run: npm ci

      - name: Contracts Compile
        working-directory: ./contracts
        run: npx hardhat compile
